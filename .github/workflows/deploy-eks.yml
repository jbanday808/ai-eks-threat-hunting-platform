name: Deploy to EKS

on:
  workflow_run:
    workflows:
      - Docker Build and ECR Push
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy AI triage workload
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubectl
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"
      - name: Create detection namespace
        run: kubectl create namespace detection-lab --dry-run=client -o yaml | kubectl apply -f -
      - name: Render Kubernetes manifest
        env:
          IMAGE_URI: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        run: sed "s|REPLACE_IMAGE|$IMAGE_URI|g" k8s/ai-triage/deployment.yaml > /tmp/ai-triage-deployment.yaml
      - name: Apply Kubernetes manifest
        run: kubectl apply -f /tmp/ai-triage-deployment.yaml
      - name: Verify deployment
        run: |
          kubectl -n detection-lab rollout status deployment/ai-triage --timeout=120s
          kubectl -n detection-lab get deployment ai-triage
          kubectl -n detection-lab get pods -l app=ai-triage
      - name: Validate Falco if installed
        run: |
          kubectl get namespace falco || true
          kubectl get pods -A | grep -i falco || true
      - name: Validate GuardDuty runtime agent if enabled
        run: |
          kubectl get namespace amazon-guardduty || true
          kubectl get namespace aws-guardduty || true
          kubectl get pods -A | grep -i guardduty || true
          aws eks describe-addon --cluster-name "$EKS_CLUSTER_NAME" --addon-name aws-guardduty-agent --region "$AWS_REGION" || true
